<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Vídeos</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <video width="600" poster="midias/thumb.png" controls loop>
        <source src="midias/bomb.mp4" type="video/mp4">
        <source src="midias/bomb.mkv" type="video/mkv">
        <source src="midias/bomb.webm" type="video/webm">
        <source src="midias/bomb.ogv" type="video/ogv">
        <p>Seu navegador não é compatível com vídeos</p>
    </video>
    <h1>Inserindo vídeo do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/WCYLpKuMcjE?si=cv_BQUsnzMQlMYtc" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>Inserindo vídeo do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/932290603?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="Poatan Animation"></iframe>
</body>
</html>
